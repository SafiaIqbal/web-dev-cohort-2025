<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faryab Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background: #fff; /* neutral background */
      color: #0b1f3b;   /* deep navy text */
    }

    nav {
      background: #0b1f3b; /* deep navy */
      color: #fff;
      padding: 15px 20px;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    nav a {
      color: #6fd1c7; /* secondary teal */
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #ff6b5a; /* accent coral */
    }

    h1 {
      text-align: center;
      margin: 20px 0;
      font-size: 2rem;
      color: #6fd1c7; /* ocean blue */
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-height: 400px;
      aspect-ratio: 16 / 7;
      overflow: hidden;
      margin-bottom: 30px;
      border-bottom: 4px solid #f33cdc; /* secondary pink accent */
    }

    .video-wrapper iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 105%;
      height: 105%;
      transform: translate(-50%, -50%);
      border: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 30px;
      animation: fadeIn 1.2s ease-in-out;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      transition: transform 0.5s ease, box-shadow 0.5s ease, filter 0.5s ease, border 0.3s ease;
      cursor: pointer;
      animation: popUp 0.8s ease forwards;
      border: 3px solid #6b7280; /* neutral gray border */
    }

    .gallery img:hover {
      transform: scale(1.1) rotate(1deg);
      box-shadow: 0 12px 24px rgba(0,0,0,0.25);
      filter: brightness(1.15) saturate(1.3);
      border-color: #2fa36b; /* accent green on hover */
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes popUp {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 768px) {
      .video-wrapper {
        max-height: 250px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#">Home</a>
    <a href="#">Food</a>
    <a href="#">Attraction</a>
    <a href="#">Gallery</a>
  </nav>

  <h1>Faryab Gallery</h1>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/cj4hhpFKLdw?autoplay=1&mute=1&loop=1&playlist=cj4hhpFKLdw&controls=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
    
  </div>

  <div class="content">
    <p style="text-align:center; color:#6b7280;">Welcome to the Faryab Gallery!</p>
  </div>

  <div class="gallery">
    <img src="images/5nh1y5kzbfe81.webp" alt="Faryab Mountains">
    <img src="images/6a5i65kzbfe81.webp" alt="Faryab Valley">
    <img src="images/6seou7kzbfe81.webp" alt="Faryab Mosque">
    <img src="images/kWonHuxBIBiANA13DsKdU0bWdMBkch9wTQcVR1koQXk.webp" alt="Faryab Bazaar">
    <img src="images/v1hkp5kzbfe81.webp" alt="Faryab Landscape">
  </div>

</body>
</html>
